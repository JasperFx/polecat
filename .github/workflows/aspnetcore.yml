name: aspnetcore

on:
  push:
  #  branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  call-test-template:
    uses: ./.github/workflows/test-template.yml
    strategy:
      fail-fast: false
      matrix:
        use_azure_sql_edge: [true, false]
        run: [1, 2, 3, 4, 5]   # repeat
    with:
      TEST_PROJECT_PATH: src/Polecat.AspNetCore.Testing/Polecat.AspNetCore.Testing.csproj
      USE_AZURE_SQL_EDGE: ${{ matrix.use_azure_sql_edge }}
